<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Registration Form</title>
      <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Event Registration Form</h1>
    <h2>Registeration form for the upcoming events</h2>
    <form>
        <label>name</label><br>
        <input type="text" placeholder="Enter your name" required autofocus></input>
        <br>
        <label>email</label><br>
        <input type="email" placeholder="Enter your email" required></input>
        <br>
        <label>date</label><br>
        <input type="date" placeholder="Enter DOB" required></input>
        <br>
        <label>Event</label><br>
        <select>
            <option>
                Seminar
            </option>
            <option>
                Competition
            </option>
            <option>
                Community Meeting
            </option>
            <option>
                Workshop
            </option>
        </select>
        <br>
        <label>Message</label><br>
        <textarea placeholder="Additional Message"></textarea>
        <br>
        <button style="color:green;">Register</button>
    </form>
    <output>
        Registration submitted successfully!
    </output>

</body>

</html>
